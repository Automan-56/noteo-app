<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f0f13" />
    <title>Email confirmé | Noteo</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap");

      :root {
        color-scheme: dark;
        --bg: #0f0f13;
        --panel: rgba(255, 255, 255, 0.04);
        --panel-border: rgba(255, 255, 255, 0.08);
        --text: #ffffff;
        --muted: #cbd5e1;
        --accent: #8b5cf6;
        --accent-hover: #7c3aed;
        --success: #22c55e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        font-family: "Inter", Arial, sans-serif;
        background:
          radial-gradient(circle at top, rgba(139, 92, 246, 0.18), transparent 34%),
          radial-gradient(circle at bottom, rgba(34, 197, 94, 0.12), transparent 28%),
          var(--bg);
        color: var(--text);
      }

      .shell {
        width: min(100%, 560px);
      }

      .card {
        padding: 40px 32px;
        border: 1px solid var(--panel-border);
        border-radius: 28px;
        background: var(--panel);
        backdrop-filter: blur(16px);
        text-align: center;
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
      }

      .icon {
        width: 92px;
        height: 92px;
        margin: 0 auto 24px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: rgba(34, 197, 94, 0.16);
        border: 1px solid rgba(34, 197, 94, 0.38);
        animation: checkmark-pop 0.6s ease-out both;
        transform-origin: center;
      }

      .icon svg {
        width: 40px;
        height: 40px;
        stroke: var(--success);
        stroke-width: 3;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      h1 {
        margin: 0 0 14px;
        font-size: clamp(2rem, 5vw, 2.6rem);
        line-height: 1.1;
      }

      p {
        margin: 0 auto;
        max-width: 440px;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.7;
      }

      .actions {
        margin-top: 30px;
      }

      .button {
        appearance: none;
        border: 0;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 52px;
        padding: 0 24px;
        border-radius: 999px;
        background: var(--accent);
        color: #ffffff;
        font: inherit;
        font-weight: 600;
        text-decoration: none;
        transition:
          transform 0.18s ease,
          background-color 0.18s ease,
          box-shadow 0.18s ease;
        box-shadow: 0 14px 32px rgba(139, 92, 246, 0.28);
      }

      .button:hover {
        background: var(--accent-hover);
        transform: translateY(-1px);
      }

      .button:active {
        transform: translateY(0);
      }

      .fallback {
        min-height: 24px;
        margin-top: 16px;
        color: var(--muted);
        font-size: 0.95rem;
        opacity: 0;
        transition: opacity 0.2s ease;
      }

      .fallback.is-visible {
        opacity: 1;
      }

      @keyframes checkmark-pop {
        0% {
          opacity: 0;
          transform: scale(0.65);
        }
        70% {
          opacity: 1;
          transform: scale(1.08);
        }
        100% {
          opacity: 1;
          transform: scale(1);
        }
      }

      @media (max-width: 640px) {
        body {
          padding: 18px;
        }

        .card {
          padding: 32px 22px;
          border-radius: 24px;
        }

        .icon {
          width: 82px;
          height: 82px;
          margin-bottom: 20px;
        }

        p {
          font-size: 0.98rem;
        }

        .button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="card" aria-labelledby="title">
        <div class="icon" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M5 13l4 4L19 7" />
          </svg>
        </div>
        <h1 id="title">Email confirmé ! 🎉</h1>
        <p>
          Ton compte Noteo est activé. Tu peux maintenant fermer cet onglet et te
          connecter à l&apos;application.
        </p>
        <div class="actions">
          <button class="button" id="open-noteo" type="button">Ouvrir Noteo</button>
          <div class="fallback" id="fallback-message" aria-live="polite">
            Lance l&apos;application depuis ton bureau
          </div>
        </div>
      </section>
    </main>

    <script>
      const openButton = document.getElementById("open-noteo");
      const fallbackMessage = document.getElementById("fallback-message");
      let fallbackTimer;

      function showFallback() {
        fallbackMessage.classList.add("is-visible");
      }

      function clearFallbackTimer() {
        if (fallbackTimer) {
          window.clearTimeout(fallbackTimer);
          fallbackTimer = null;
        }
      }

      document.addEventListener("visibilitychange", () => {
        if (document.hidden) {
          clearFallbackTimer();
        }
      });

      openButton.addEventListener("click", () => {
        fallbackMessage.classList.remove("is-visible");
        clearFallbackTimer();
        window.location.href = "noteo://";
        fallbackTimer = window.setTimeout(showFallback, 1600);
      });
    </script>
  </body>
</html>
