<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f0f13" />
    <title>Noteo</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Inter, Arial, sans-serif;
        background: #0f0f13;
        color: #ffffff;
      }

      main {
        width: min(100%, 480px);
        text-align: center;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 4vw, 2.75rem);
      }

      p {
        margin: 0 0 20px;
        color: #cbd5e1;
        line-height: 1.6;
      }

      a {
        display: inline-block;
        padding: 12px 18px;
        border-radius: 999px;
        background: #8b5cf6;
        color: #ffffff;
        font-weight: 600;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Bienvenue sur Noteo</h1>
      <p>
        Cette page sert de point d&apos;entrée GitHub Pages. Si ton email vient d&apos;être
        confirmé, tu peux continuer vers la page de confirmation.
      </p>
      <a href="./confirm.html">Aller vers la confirmation</a>
    </main>

    <script>
      if (window.location.hash && window.location.hash.includes("access_token")) {
        window.location.replace("./confirm.html" + window.location.hash);
      }
    </script>
  </body>
</html>
